<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>挂机时间云端查询系统</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 50px 20px; background-color: #f4f6f8; color: #334155; }
      .container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        input { width: 80%; padding: 12px; margin: 10px 0 20px; font-size: 15px; border-radius: 8px; border: 1px solid #cbd5e1; outline: none; }
        button { width: 88%; padding: 12px; background-color: #0EA5E9; color: white; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #0284C7; }
        #result { margin-top: 25px; font-size: 18px; }
      .time-display { font-size: 32px; font-weight: bold; color: #10B981; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🕒 挂机时间查询</h2>
        <p style="font-size: 13px; color: #94A3B8;">请输入您的专属卡密以获取最新进度</p>
        
        <input type="text" id="kamiInput" placeholder="请输入专属账号/卡密">
        <button onclick="queryTime()">立即查询</button>
        
        <div id="result"></div>
    </div>

    <script>
        function formatSeconds(secs) {
            const h = Math.floor(secs / 3600);
            const m = Math.floor((secs % 3600) / 60);
            const s = Math.floor(secs % 60);
            const hh = h < 10? "0" + h : h;
            const mm = m < 10? "0" + m : m;
            const ss = s < 10? "0" + s : s;
            return hh + ":" + mm + ":" + ss;
        }

        function queryTime() {
            const kami = document.getElementById("kamiInput").value.trim();
            const resultDiv = document.getElementById("result");
            
            if (!kami) {
                resultDiv.innerHTML = "<span style='color:#EF4444;'>卡密不能为空！</span>";
                return;
            }

            resultDiv.innerHTML = "<span style='color:#94A3B8;'>努力查询中，请稍候...</span>";

            const t = Math.floor(Date.now() / 1000);

            const signStr = "kami=" + kami + "&t=" + t + "&" + appKey;
            const sign = CryptoJS.MD5(signStr).toString();

            // 原始请求地址（携带了 t 和 sign 参数）
            const targetUrl = `http://wy.llua.cn/api/?id=getvalue&app=${appId}&kami=${kami}&t=${t}&sign=${sign}&value=MatchTime`;
            
            // 使用另外一个更稳定的跨域代理，且不包裹额外的 JSON
            const proxyUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`;

            fetch(proxyUrl)
            .then(function(response) {
                  return response.text(); // 先按纯文本读取，防止防CC页面导致崩溃
              })
            .then(function(text) {
                  // 智能拦截：如果服务器返回了防CC的网页代码，直接提示用户
                  if (text.indexOf("当前为")!== -1 || text.indexOf("<html")!== -1) {
                      resultDiv.innerHTML = "<span style='color:#F59E0B;'>查询失败：触发了微验服务器的防CC限制，请隔几分钟后再试。</span>";
                      return;
                  }

                  // 正常解析 JSON
                  const data = JSON.parse(text);

                  if (data.code === 200) {
                      const totalSeconds = parseInt(data.msg, 10);
                      if (!isNaN(totalSeconds)) {
                          resultDiv.innerHTML = "当前累计已挂机：<div class='time-display'>" + formatSeconds(totalSeconds) + "</div>";
                      } else {
                          resultDiv.innerHTML = "<span style='color:#F59E0B;'>该账号暂未开始上传数据</span>";
                      }
                  } else {
                      const errorMsg = data.msg? data.msg : "卡密不存在或过期";
                      resultDiv.innerHTML = "<span style='color:#EF4444;'>查询异常：" + errorMsg + "</span>";
                  }
              })
            .catch(function(error) {
                  resultDiv.innerHTML = "<span style='color:#EF4444;'>网络请求超时或跨域代理被拦截。</span>";
                  console.error(error);
              });
        }
    </script>
</body>
</html>
